name: Staging Package

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    name: Build Staging Plugin Zip
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve staging metadata
        id: staging
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="0.0.0-develop.${GITHUB_RUN_NUMBER}"
          zip_name="creatorstack-ai-staging-${short_sha}.zip"

          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-lock

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Lint PHP files
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint styles
        run: npm run lint:css

      - name: Run Node tests
        run: npm run test:node

      - name: Build assets
        run: npm run build

      - name: Run e2e tests
        run: npx playwright test

      - name: Sync staging package version
        run: npm run version:set -- "${{ steps.staging.outputs.version }}"

      - name: Build plugin zip
        run: npm run plugin-zip -- --root-folder=creatorstack-ai

      - name: Rename staging zip
        run: mv creatorstack-ai.zip "${{ steps.staging.outputs.zip_name }}"

      - name: Verify staging zip contents
        env:
          VERSION: ${{ steps.staging.outputs.version }}
          ZIP_NAME: ${{ steps.staging.outputs.zip_name }}
        run: |
          test -f "$ZIP_NAME"
          unzip -l "$ZIP_NAME" | grep 'creatorstack-ai/creatorstack-ai.php'
          unzip -l "$ZIP_NAME" | grep 'creatorstack-ai/wp-tube-to-blog-ai.php'
          unzip -l "$ZIP_NAME" | grep 'creatorstack-ai/build/'
          unzip -p "$ZIP_NAME" creatorstack-ai/creatorstack-ai.php | grep -F "Version:           $VERSION"
          unzip -p "$ZIP_NAME" creatorstack-ai/creatorstack-ai.php | grep -F "define( 'WTTBA_VERSION', '$VERSION' );"
          unzip -p "$ZIP_NAME" creatorstack-ai/package.json | grep -F "\"version\": \"$VERSION\""

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.staging.outputs.zip_name }}
          path: ${{ steps.staging.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 14
